<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>부동산 공부 앱</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap');

:root {
  --bg: #0f0f0f;
  --bg2: #161616;
  --bg3: #1e1e1e;
  --bg4: #252525;
  --border: rgba(255,255,255,0.08);
  --border2: rgba(255,255,255,0.14);
  --text: #f0ede8;
  --text2: #a09d98;
  --text3: #6b6866;
  --accent: #d4a853;
  --accent2: #e8c27a;
  --green: #5cb87a;
  --red: #e06c6c;
  --blue: #6b9fd4;
  --purple: #9b7fd4;
  --teal: #5bbfb5;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Noto Sans KR', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  font-size: 14px;
  line-height: 1.6;
}

/* ── Layout ── */
.app { display: flex; min-height: 100vh; }

.sidebar {
  width: 220px;
  min-height: 100vh;
  background: var(--bg2);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  padding: 24px 0;
  position: fixed;
  top: 0; left: 0; bottom: 0;
  overflow-y: auto;
}

.main {
  margin-left: 220px;
  flex: 1;
  padding: 32px;
  max-width: 860px;
}

/* ── Sidebar ── */
.logo {
  padding: 0 20px 24px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 16px;
}
.logo-title {
  font-size: 13px;
  font-weight: 700;
  color: var(--accent);
  letter-spacing: 0.08em;
  text-transform: uppercase;
}
.logo-sub {
  font-size: 11px;
  color: var(--text3);
  margin-top: 2px;
}

.nav-label {
  font-size: 10px;
  font-weight: 700;
  color: var(--text3);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  padding: 0 20px;
  margin: 12px 0 6px;
}

.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 20px;
  cursor: pointer;
  color: var(--text2);
  font-size: 13px;
  transition: all .15s;
  border-left: 2px solid transparent;
}
.nav-item:hover { color: var(--text); background: rgba(255,255,255,0.03); }
.nav-item.active {
  color: var(--accent);
  border-left-color: var(--accent);
  background: rgba(212,168,83,0.06);
}
.nav-icon { font-size: 14px; width: 18px; text-align: center; }

/* ── Pages ── */
.page { display: none; }
.page.active { display: block; }

/* ── Page Header ── */
.page-header {
  margin-bottom: 28px;
}
.page-title {
  font-size: 22px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 4px;
}
.page-sub {
  font-size: 13px;
  color: var(--text3);
}

/* ── Cards ── */
.card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px;
  margin-bottom: 14px;
}
.card-title {
  font-size: 13px;
  font-weight: 700;
  color: var(--text2);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 14px;
}

/* ── Progress Overview ── */
.progress-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
  margin-bottom: 14px;
}
.stat-card {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 16px;
  text-align: center;
}
.stat-num {
  font-size: 28px;
  font-weight: 700;
  color: var(--accent);
  font-family: 'DM Mono', monospace;
  line-height: 1;
}
.stat-label { font-size: 11px; color: var(--text3); margin-top: 4px; }

/* ── Day Grid ── */
.day-grid {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 6px;
  margin-bottom: 6px;
}
.day-dot {
  aspect-ratio: 1;
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  font-family: 'DM Mono', monospace;
  font-weight: 500;
  cursor: pointer;
  transition: all .15s;
  border: 1px solid var(--border);
  background: var(--bg3);
  color: var(--text3);
}
.day-dot.completed { background: rgba(92,184,122,0.15); border-color: var(--green); color: var(--green); }
.day-dot.current { background: rgba(212,168,83,0.2); border-color: var(--accent); color: var(--accent); }
.day-dot:hover { border-color: var(--border2); color: var(--text2); }

.week-labels {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 6px;
  margin-top: 8px;
}
.week-label-item {
  font-size: 10px;
  color: var(--text3);
  text-align: center;
}

/* ── Curriculum ── */
.week-section { margin-bottom: 28px; }
.week-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 12px;
}
.week-badge {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 3px 10px;
  border-radius: 99px;
  border: 1px solid;
}
.w1 { color: var(--teal); border-color: var(--teal); background: rgba(91,191,181,0.08); }
.w2 { color: var(--blue); border-color: var(--blue); background: rgba(107,159,212,0.08); }
.w3 { color: var(--purple); border-color: var(--purple); background: rgba(155,127,212,0.08); }

.week-title-text { font-size: 15px; font-weight: 700; color: var(--text); }
.week-sub-text { font-size: 12px; color: var(--text3); }

.day-row {
  display: flex;
  align-items: flex-start;
  gap: 14px;
  padding: 14px 16px;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 10px;
  margin-bottom: 8px;
  cursor: pointer;
  transition: all .15s;
}
.day-row:hover { border-color: var(--border2); background: var(--bg4); }
.day-row.completed { border-color: rgba(92,184,122,0.25); }
.day-row.current { border-color: rgba(212,168,83,0.4); background: rgba(212,168,83,0.04); }

.day-num-badge {
  width: 36px;
  height: 36px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-family: 'DM Mono', monospace;
  font-weight: 500;
  flex-shrink: 0;
  border: 1px solid var(--border);
  background: var(--bg2);
  color: var(--text3);
}
.day-row.completed .day-num-badge { background: rgba(92,184,122,0.15); border-color: var(--green); color: var(--green); }
.day-row.current .day-num-badge { background: rgba(212,168,83,0.2); border-color: var(--accent); color: var(--accent); }

.day-info { flex: 1; }
.day-title-text { font-size: 14px; font-weight: 500; color: var(--text); margin-bottom: 3px; }
.day-desc { font-size: 12px; color: var(--text3); line-height: 1.5; }

.day-status {
  font-size: 11px;
  padding: 3px 9px;
  border-radius: 99px;
  white-space: nowrap;
  align-self: flex-start;
}
.status-done { background: rgba(92,184,122,0.12); color: var(--green); border: 1px solid rgba(92,184,122,0.3); }
.status-current { background: rgba(212,168,83,0.12); color: var(--accent); border: 1px solid rgba(212,168,83,0.3); }
.status-locked { background: var(--bg2); color: var(--text3); border: 1px solid var(--border); }

/* ── Study Session / Quiz ── */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 10px 18px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
  font-size: 13px;
  font-weight: 500;
  font-family: 'Noto Sans KR', sans-serif;
  transition: all .15s;
}
.btn-primary { background: var(--accent); color: #0f0f0f; }
.btn-primary:hover { background: var(--accent2); }
.btn-secondary { background: var(--bg3); color: var(--text); border: 1px solid var(--border2); }
.btn-secondary:hover { background: var(--bg4); }
.btn-sm { padding: 6px 14px; font-size: 12px; }
.btn-danger { background: rgba(224,108,108,0.15); color: var(--red); border: 1px solid rgba(224,108,108,0.3); }

/* Quiz */
.quiz-container { }
.quiz-progress-bar {
  height: 3px;
  background: var(--bg3);
  border-radius: 99px;
  margin-bottom: 24px;
  overflow: hidden;
}
.quiz-progress-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 99px;
  transition: width .3s ease;
}

.quiz-question-num {
  font-size: 11px;
  color: var(--text3);
  font-family: 'DM Mono', monospace;
  margin-bottom: 8px;
}
.quiz-question-text {
  font-size: 16px;
  font-weight: 500;
  color: var(--text);
  margin-bottom: 20px;
  line-height: 1.6;
}

.quiz-options { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }
.quiz-option {
  padding: 13px 16px;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 8px;
  cursor: pointer;
  font-size: 13px;
  color: var(--text2);
  transition: all .15s;
  display: flex;
  align-items: center;
  gap: 10px;
}
.quiz-option:hover:not(.disabled) { border-color: var(--accent); color: var(--text); background: rgba(212,168,83,0.05); }
.quiz-option.correct { background: rgba(92,184,122,0.1); border-color: var(--green); color: var(--green); }
.quiz-option.wrong { background: rgba(224,108,108,0.1); border-color: var(--red); color: var(--red); }
.quiz-option.disabled { cursor: default; }
.option-letter {
  width: 22px;
  height: 22px;
  border-radius: 5px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  font-family: 'DM Mono', monospace;
  font-weight: 500;
  background: var(--bg4);
  flex-shrink: 0;
  transition: all .15s;
}
.quiz-option.correct .option-letter { background: rgba(92,184,122,0.3); color: var(--green); }
.quiz-option.wrong .option-letter { background: rgba(224,108,108,0.3); color: var(--red); }

.quiz-feedback {
  padding: 14px 16px;
  border-radius: 8px;
  margin-bottom: 16px;
  font-size: 13px;
  line-height: 1.6;
  display: none;
}
.quiz-feedback.correct { background: rgba(92,184,122,0.08); border: 1px solid rgba(92,184,122,0.25); color: #8fcc9f; }
.quiz-feedback.wrong { background: rgba(224,108,108,0.08); border: 1px solid rgba(224,108,108,0.25); color: #e89090; }

/* Result */
.quiz-result {
  text-align: center;
  padding: 32px 20px;
}
.result-score {
  font-size: 56px;
  font-weight: 700;
  font-family: 'DM Mono', monospace;
  color: var(--accent);
  line-height: 1;
  margin-bottom: 8px;
}
.result-msg { font-size: 16px; color: var(--text2); margin-bottom: 24px; }

/* Wrong note */
.wrong-note {
  background: rgba(224,108,108,0.06);
  border: 1px solid rgba(224,108,108,0.2);
  border-radius: 10px;
  padding: 16px;
  margin-bottom: 10px;
}
.wrong-note-q {
  font-size: 13px;
  font-weight: 500;
  color: var(--text);
  margin-bottom: 8px;
}
.wrong-note-row {
  display: flex;
  gap: 8px;
  margin-bottom: 4px;
  font-size: 12px;
}
.wrong-label-my { color: var(--red); min-width: 60px; }
.wrong-label-correct { color: var(--green); min-width: 60px; }
.wrong-note-explain {
  margin-top: 8px;
  font-size: 12px;
  color: var(--text3);
  line-height: 1.6;
  padding-top: 8px;
  border-top: 1px solid var(--border);
}

/* Summary notes */
.summary-day-card {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 10px;
  margin-bottom: 10px;
  overflow: hidden;
}
.summary-day-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px;
  cursor: pointer;
  transition: background .15s;
}
.summary-day-header:hover { background: var(--bg4); }
.summary-day-title {
  display: flex;
  align-items: center;
  gap: 10px;
}
.summary-day-num {
  font-size: 11px;
  font-family: 'DM Mono', monospace;
  color: var(--accent);
  font-weight: 500;
}
.summary-day-name { font-size: 13px; font-weight: 500; color: var(--text); }
.summary-day-date { font-size: 11px; color: var(--text3); }
.summary-chevron {
  font-size: 12px;
  color: var(--text3);
  transition: transform .2s;
}
.summary-day-card.open .summary-chevron { transform: rotate(180deg); }
.summary-day-body {
  display: none;
  padding: 0 16px 16px;
  border-top: 1px solid var(--border);
}
.summary-day-card.open .summary-day-body { display: block; }
.summary-term {
  margin-top: 12px;
}
.summary-term-name {
  font-size: 13px;
  font-weight: 500;
  color: var(--accent2);
  margin-bottom: 2px;
}
.summary-term-desc {
  font-size: 12px;
  color: var(--text3);
  line-height: 1.6;
}

/* Empty state */
.empty-state {
  text-align: center;
  padding: 48px 20px;
  color: var(--text3);
}
.empty-icon { font-size: 32px; margin-bottom: 12px; }
.empty-text { font-size: 14px; }

/* Loading */
.loading-state {
  text-align: center;
  padding: 40px;
}
.spinner {
  width: 32px; height: 32px;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin .8s linear infinite;
  margin: 0 auto 16px;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-size: 13px; color: var(--text3); }

/* Study screen */
.study-content {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 28px;
  margin-bottom: 20px;
  font-size: 14px;
  line-height: 1.9;
  color: var(--text2);
  white-space: pre-wrap;
}
.study-content strong { color: var(--text); font-weight: 700; }

/* Tag */
.tag {
  display: inline-block;
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 99px;
  border: 1px solid;
  margin-right: 4px;
}
.tag-teal { color: var(--teal); border-color: rgba(91,191,181,0.4); background: rgba(91,191,181,0.08); }
.tag-blue { color: var(--blue); border-color: rgba(107,159,212,0.4); background: rgba(107,159,212,0.08); }
.tag-purple { color: var(--purple); border-color: rgba(155,127,212,0.4); background: rgba(155,127,212,0.08); }
.tag-gold { color: var(--accent); border-color: rgba(212,168,83,0.4); background: rgba(212,168,83,0.08); }

/* divider */
.divider { height: 1px; background: var(--border); margin: 20px 0; }

/* streaks */
.streak-row { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
.streak-dot {
  width: 28px; height: 28px; border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; font-family: 'DM Mono', monospace;
  transition: all .15s;
}

/* Toast */
.toast {
  position: fixed;
  bottom: 24px; right: 24px;
  background: var(--bg3);
  border: 1px solid var(--border2);
  border-radius: 8px;
  padding: 12px 16px;
  font-size: 13px;
  color: var(--text);
  z-index: 999;
  animation: slideUp .3s ease;
  max-width: 280px;
}
@keyframes slideUp { from { opacity:0; transform: translateY(8px); } }

/* Scrollbar */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 99px; }

@media (max-width: 700px) {
  .sidebar { width: 60px; }
  .sidebar .logo-title, .sidebar .logo-sub, .sidebar .nav-label, .nav-item span { display: none; }
  .main { margin-left: 60px; padding: 20px 16px; }
  .progress-grid { grid-template-columns: repeat(2, 1fr); }
}
</style>
</head>
<body>
<div class="app">

<!-- Sidebar -->
<nav class="sidebar">
  <div class="logo">
    <div class="logo-title">부동산 공부</div>
    <div class="logo-sub">3주 집중 커리큘럼</div>
  </div>
  <div class="nav-label">메뉴</div>
  <div class="nav-item active" onclick="showPage('home')" id="nav-home">
    <span class="nav-icon">🏠</span><span>홈 & 진도</span>
  </div>
  <div class="nav-item" onclick="showPage('curriculum')" id="nav-curriculum">
    <span class="nav-icon">📅</span><span>커리큘럼</span>
  </div>
  <div class="nav-item" onclick="showPage('study')" id="nav-study">
    <span class="nav-icon">📖</span><span>오늘 학습</span>
  </div>
  <div class="nav-item" onclick="showPage('quiz')" id="nav-quiz">
    <span class="nav-icon">✏️</span><span>퀴즈</span>
  </div>
  <div class="nav-item" onclick="showPage('notes')" id="nav-notes">
    <span class="nav-icon">📝</span><span>오답노트</span>
  </div>
  <div class="nav-item" onclick="showPage('summary')" id="nav-summary">
    <span class="nav-icon">📚</span><span>요약노트</span>
  </div>
</nav>

<!-- Main -->
<main class="main">

<!-- ═══ HOME ═══ -->
<div class="page active" id="page-home">
  <div class="page-header">
    <div class="page-title">안녕하세요 👋</div>
    <div class="page-sub" id="today-info">오늘의 학습을 시작해보세요</div>
  </div>

  <div class="progress-grid">
    <div class="stat-card">
      <div class="stat-num" id="stat-days">0</div>
      <div class="stat-label">완료한 날</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="stat-quiz">0%</div>
      <div class="stat-label">평균 퀴즈 점수</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="stat-wrong">0</div>
      <div class="stat-label">오답 누적</div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">18일 학습 지도</div>
    <div class="day-grid" id="home-day-grid"></div>
    <div style="display:flex; gap:16px; margin-top:12px; font-size:11px; color:var(--text3);">
      <span>⬜ 미학습</span>
      <span style="color:var(--accent)">▣ 오늘</span>
      <span style="color:var(--green)">✓ 완료</span>
    </div>
  </div>

  <div class="card" id="today-card">
    <div class="card-title">오늘 할 일</div>
    <div id="today-content"></div>
  </div>
</div>

<!-- ═══ CURRICULUM ═══ -->
<div class="page" id="page-curriculum">
  <div class="page-header">
    <div class="page-title">커리큘럼</div>
    <div class="page-sub">18일 · 하루 15~20분</div>
  </div>
  <div id="curriculum-list"></div>
</div>

<!-- ═══ STUDY ═══ -->
<div class="page" id="page-study">
  <div id="study-area"></div>
</div>

<!-- ═══ QUIZ ═══ -->
<div class="page" id="page-quiz">
  <div id="quiz-area"></div>
</div>

<!-- ═══ WRONG NOTES ═══ -->
<div class="page" id="page-notes">
  <div class="page-header">
    <div class="page-title">오답노트</div>
    <div class="page-sub">틀린 문제만 모아서 복습해요</div>
  </div>
  <div id="notes-list"></div>
</div>

<!-- ═══ SUMMARY ═══ -->
<div class="page" id="page-summary">
  <div class="page-header">
    <div class="page-title">요약노트</div>
    <div class="page-sub">학습 완료 날짜별 핵심 개념 정리</div>
  </div>
  <div id="summary-list"></div>
</div>

</main>
</div>

<script>
// ════════════════════════════════════════
// DATA
// ════════════════════════════════════════
const CURRICULUM = [

const STATE_KEY = 'realestate_study_v1';

function loadState() {
  try {
    const s = window.storage ? null : null; // will use localStorage-like via variable
    const raw = sessionStateCache;
    return raw ? JSON.parse(raw) : defaultState();
  } catch(e) { return defaultState(); }
}

let sessionStateCache = null;

function defaultState() {
  return {
    currentDay: 1,
    completedDays: [],
    quizScores: {},      // {day: score%}
    wrongNotes: [],      // [{day, question, myAns, correctAns, exp, date}]
    summaryDates: {},    // {day: 'YYYY-MM-DD'}
    lastStudied: null
  };
}

let STATE = defaultState();

function saveState() {
  sessionStateCache = JSON.stringify(STATE);
  try {
    // Use storage API
    window._studyState = STATE;
  } catch(e) {}
}

// Persist across page
if (window._studyState) STATE = window._studyState;

function showPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  document.getElementById('nav-'+name).classList.add('active');

  if (name==='home') renderHome();
  if (name==='curriculum') renderCurriculum();
  if (name==='study') renderStudyPage();
  if (name==='quiz') renderQuizPage();
  if (name==='notes') renderNotes();
  if (name==='summary') renderSummary();
}

function renderHome() {

    ${hasReview && prevCompleted ? `<div style="font-size:12px;color:var(--accent);margin-bottom:10px;">📌 오늘 학습 전, 전날(Day ${prevDay}) 복습 퀴즈가 포함돼요</div>` : ''}

async function startAIStudy(day) {
  const c = CURRICULUM.find(d => d.day === day);
  if (!c || !c.prompt) return;
  const area = document.getElementById('ai-study-result');
  area.innerHTML = `<div class="loading-state"><div class="spinner"></div><div class="loading-text">AI가 오늘 내용을 정리하는 중...</div></div>`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: '당신은 부동산 초보 투자자를 위한 선생님이에요. 핵심 개념을 쉽고 명확하게 설명해주세요. 적절히 줄바꿈을 사용하고, 중요 용어는 **볼드**로 강조해주세요. 예시를 반드시 포함하세요.',
        messages: [{ role:'user', content: c.prompt }]
      })
    });
    const data = await res.json();
    const text = data.content?.map(i=>i.text||'').join('') || '내용을 불러오지 못했어요.';
    const html = text.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>');
    area.innerHTML = `<div class="study-content">${html}</div>
      <button class="btn btn-secondary btn-sm" onclick="markComplete(${day})">✓ 학습 완료 표시 후 퀴즈로</button>`;
  } catch(e) {
    area.innerHTML = `<div class="card" style="color:var(--text3);">API 연결 오류. 아래 핵심 용어를 직접 공부해보세요.</div>`;
  }
}

function markComplete(day) {
  if (!STATE.completedDays.includes(day)) {
    STATE.completedDays.push(day);
    const c = CURRICULUM.find(d=>d.day===day);
    if (c) STATE.summaryDates[day] = new Date().toLocaleDateString('ko-KR');
    if (day === STATE.currentDay && day < 18) {
      STATE.currentDay = day + 1;
    }
    saveState();
    showToast('Day ' + day + ' 완료! 퀴즈를 풀어보세요 ✓');
  }
  showPage('quiz');
}

let currentQuizState = null;

function renderQuizPage() {
  const area = document.getElementById('quiz-area');
  const c = CURRICULUM.find(d => d.day === STATE.currentDay);
  if (!c) return;

  if (currentQuizState && !currentQuizState.done) {
    renderQuizQuestion();
    return;
  }

  const quizBank = QUIZ_BANK[STATE.currentDay];
  const hasQuiz = quizBank && quizBank.length > 0;

  area.innerHTML = `
    <div class="page-header">
      <div class="page-title">퀴즈</div>
      <div class="page-sub">Day ${STATE.currentDay} · ${c.title}</div>
    </div>
    ${hasQuiz ? `
    <div class="card">
      <div class="card-title">오늘의 퀴즈</div>
      <p style="font-size:13px;color:var(--text3);margin-bottom:6px;">문제 수: ${quizBank.length}문제 · 오답 시 즉시 해설 제공</p>
      ${STATE.quizScores[STATE.currentDay] !== undefined ? `
        <p style="font-size:13px;color:var(--green);margin-bottom:12px;">이전 점수: ${STATE.quizScores[STATE.currentDay]}%</p>
      ` : ''}
      <button class="btn btn-primary" onclick="startQuiz(${STATE.currentDay})">퀴즈 시작</button>
    </div>
    ` : `
    <div class="empty-state">
      <div class="empty-icon">📅</div>
      <div class="empty-text">이 날은 복습 퀴즈로 진행돼요<br>커리큘럼에서 복습 시작을 눌러주세요</div>
    </div>
    `}
  `;
}

function startQuiz(day) {
  const bank = QUIZ_BANK[day];
  if (!bank) return;
  currentQuizState = {
    day,
    questions: [...bank],
    currentIdx: 0,
    wrongs: [],
    score: 0,
    done: false,
    isReview: false
  };
  renderQuizQuestion();
}

function startReviewQuiz(prevDay) {
  const bank = QUIZ_BANK[prevDay];
  if (!bank) return;
  // Pick 2-3 questions from prev day, mix with wrongs
  const wrongs = STATE.wrongNotes.filter(w => w.day === prevDay);
  const wrongQs = wrongs.map(w => bank.find(q => q.q === w.question)).filter(Boolean);
  const others = bank.filter(q => !wrongQs.find(wq => wq.q === q.q));
  const selected = [...wrongQs.slice(0,2), ...others.slice(0, Math.max(1, 3-wrongQs.length))];

  currentQuizState = {
    day: prevDay,
    questions: selected,
    currentIdx: 0,
    wrongs: [],
    score: 0,
    done: false,
    isReview: true,
    label: `Day ${prevDay} 복습`
  };
  const area = document.getElementById('study-area');
  area.innerHTML = '';
  showPage('quiz');
  renderQuizQuestion();
}

function startWeekReviewQuiz(reviewDay) {
  const weekDays = REVIEW_TOPICS[reviewDay] || [];
  let allQs = [];
  weekDays.forEach(d => {
    const bank = QUIZ_BANK[d];
    if (bank) allQs.push(...bank);
  });
  // Mix in wrongs
  const wrongs = STATE.wrongNotes.filter(w => weekDays.includes(w.day));
  const wrongQs = wrongs.map(w => {
    const bank = QUIZ_BANK[w.day];
    return bank ? bank.find(q => q.q === w.question) : null;
  }).filter(Boolean);
  const others = allQs.filter(q => !wrongQs.find(wq=>wq.q===q.q));
  shuffle(others);
  const selected = [...wrongQs, ...others].slice(0, 8);

  currentQuizState = {
    day: reviewDay,
    questions: selected,
    currentIdx: 0,
    wrongs: [],
    score: 0,
    done: false,
    isReview: true,
    label: `${Math.ceil(reviewDay/6)}주차 복습`
  };
  showPage('quiz');
  renderQuizQuestion();
}

function renderQuizQuestion() {
  const area = document.getElementById('quiz-area');
  const qs = currentQuizState;
  if (qs.done) { renderQuizResult(); return; }
  const q = qs.questions[qs.currentIdx];
  const total = qs.questions.length;
  const pct = Math.round((qs.currentIdx / total) * 100);

  area.innerHTML = `
    <div class="page-header">
      <div class="page-title">${qs.label || 'Day '+qs.day+' 퀴즈'}</div>
    </div>
    <div class="quiz-container">
      <div class="quiz-progress-bar"><div class="quiz-progress-fill" style="width:${pct}%"></div></div>
      <div class="quiz-question-num">${qs.currentIdx+1} / ${total}</div>
      <div class="quiz-question-text">${q.q}</div>
      <div class="quiz-options" id="quiz-opts">
        ${q.opts.map((opt,i) => `
          <div class="quiz-option" onclick="selectAnswer(${i})" data-idx="${i}">
            <span class="option-letter">${'ABCD'[i]}</span>
            <span>${opt}</span>
          </div>
        `).join('')}
      </div>
      <div class="quiz-feedback" id="quiz-feedback"></div>
      <div id="quiz-next-btn"></div>
    </div>
  `;
}

function selectAnswer(selected) {
  const q = currentQuizState.questions[currentQuizState.currentIdx];
  const opts = document.querySelectorAll('.quiz-option');
  opts.forEach(o => o.classList.add('disabled'));

  const isCorrect = selected === q.ans;
  opts[selected].classList.add(isCorrect ? 'correct' : 'wrong');
  if (!isCorrect) opts[q.ans].classList.add('correct');

  const feedback = document.getElementById('quiz-feedback');
  feedback.style.display = 'block';
  feedback.className = 'quiz-feedback ' + (isCorrect ? 'correct' : 'wrong');
  feedback.innerHTML = isCorrect
    ? `✓ 정답! ${q.exp}`
    : `✗ 오답. 정답은 <strong>${'ABCD'[q.ans]}. ${q.opts[q.ans]}</strong><br><br>${q.exp}`;

  if (isCorrect) {
    currentQuizState.score++;
  } else {
    currentQuizState.wrongs.push({
      day: currentQuizState.day,
      question: q.q,
      myAns: q.opts[selected],
      correctAns: q.opts[q.ans],
      exp: q.exp,
      date: new Date().toLocaleDateString('ko-KR')
    });
  }

  const nextBtn = document.getElementById('quiz-next-btn');
  const isLast = currentQuizState.currentIdx === currentQuizState.questions.length - 1;
  nextBtn.innerHTML = `<button class="btn btn-primary" onclick="nextQuestion()">${isLast ? '결과 보기' : '다음 문제 →'}</button>`;
}

function nextQuestion() {
  currentQuizState.currentIdx++;
  if (currentQuizState.currentIdx >= currentQuizState.questions.length) {
    currentQuizState.done = true;
    // Save score & wrong notes
    const score = Math.round((currentQuizState.score / currentQuizState.questions.length) * 100);
    STATE.quizScores[currentQuizState.day] = score;
    currentQuizState.wrongs.forEach(w => {
      if (!STATE.wrongNotes.find(n => n.question === w.question && n.day === w.day)) {
        STATE.wrongNotes.push(w);
      }
    });
    if (!STATE.completedDays.includes(currentQuizState.day)) {
      STATE.completedDays.push(currentQuizState.day);
      STATE.summaryDates[currentQuizState.day] = new Date().toLocaleDateString('ko-KR');
    }
    saveState();
    renderQuizResult();
  } else {
    renderQuizQuestion();
  }
}

function renderQuizResult() {
  const area = document.getElementById('quiz-area');
  const qs = currentQuizState;
  const score = Math.round((qs.score / qs.questions.length) * 100);
  const msg = score === 100 ? '완벽해요! 🎉' : score >= 70 ? '잘 했어요! 👍' : '오답노트를 꼭 확인하세요 📝';

  let wrongHtml = '';
  if (qs.wrongs.length > 0) {
    wrongHtml = `
      <div style="margin-top:20px;">
        <div class="card-title">오답노트 — 방금 틀린 문제</div>
        ${qs.wrongs.map(w => `
          <div class="wrong-note">
            <div class="wrong-note-q">Q. ${w.question}</div>
            <div class="wrong-note-row"><span class="wrong-label-my">내 답:</span> ${w.myAns}</div>
            <div class="wrong-note-row"><span class="wrong-label-correct">정답:</span> ${w.correctAns}</div>
            <div class="wrong-note-explain">${w.exp}</div>
          </div>
        `).join('')}
      </div>
    `;
  }

  area.innerHTML = `
    <div class="quiz-result">
      <div class="result-score">${score}%</div>
      <div class="result-msg">${msg}</div>
      <div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap;">
        <button class="btn btn-primary" onclick="showPage('summary')">📚 요약노트 보기</button>
        <button class="btn btn-secondary" onclick="startQuiz(${qs.day})">🔄 재도전</button>
        <button class="btn btn-secondary" onclick="showPage('home')">🏠 홈으로</button>
      </div>
    </div>
    ${wrongHtml}
  `;
}

// ════════════════════════════════════════
// WRONG NOTES
// ════════════════════════════════════════
function renderNotes() {
  const list = document.getElementById('notes-list');
  if (STATE.wrongNotes.length === 0) {
    list.innerHTML = `<div class="empty-state"><div class="empty-icon">🎯</div><div class="empty-text">아직 틀린 문제가 없어요!<br>퀴즈를 풀어보세요</div></div>`;
    return;
  }

  // Group by day
  const byDay = {};
  STATE.wrongNotes.forEach(w => {
    if (!byDay[w.day]) byDay[w.day] = [];
    byDay[w.day].push(w);
  });

  list.innerHTML = `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
      <span style="font-size:13px;color:var(--text3);">총 ${STATE.wrongNotes.length}개</span>
      <button class="btn btn-danger btn-sm" onclick="clearNotes()">전체 삭제</button>
    </div>
    ${Object.entries(byDay).sort((a,b)=>Number(b[0])-Number(a[0])).map(([day, wrongs]) => {
      const c = CURRICULUM.find(d=>d.day===Number(day));
      return `
        <div style="margin-bottom:20px;">
          <div style="font-size:12px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px;">
            Day ${day} · ${c?.title||''}
          </div>
          ${wrongs.map(w => `
            <div class="wrong-note">
              <div class="wrong-note-q">Q. ${w.question}</div>
              <div class="wrong-note-row"><span class="wrong-label-my">내 답:</span> ${w.myAns}</div>
              <div class="wrong-note-row"><span class="wrong-label-correct">정답:</span> ${w.correctAns}</div>
              <div class="wrong-note-explain">${w.exp}</div>
              <div style="font-size:11px;color:var(--text3);margin-top:6px;">${w.date}</div>
            </div>
          `).join('')}
        </div>
      `;
    }).join('')}
  `;
}

function clearNotes() {
  STATE.wrongNotes = [];
  saveState();
  renderNotes();
  showToast('오답노트를 초기화했어요');
}

// ════════════════════════════════════════
// SUMMARY
// ════════════════════════════════════════
function renderSummary() {
  const list = document.getElementById('summary-list');
  const completed = STATE.completedDays;

  if (completed.length === 0) {
    list.innerHTML = `<div class="empty-state"><div class="empty-icon">📚</div><div class="empty-text">아직 완료한 학습이 없어요<br>학습을 시작해보세요!</div></div>`;
    return;
  }

  list.innerHTML = completed.sort((a,b)=>a-b).map(day => {
    const c = CURRICULUM.find(d=>d.day===day);
    if (!c || !c.summaryTerms || c.summaryTerms.length===0) return '';
    const date = STATE.summaryDates[day] || '';
    const score = STATE.quizScores[day];
    const cardId = 'summary-day-'+day;
    return `
      <div class="summary-day-card" id="${cardId}">
        <div class="summary-day-header" onclick="toggleSummary('${cardId}')">
          <div class="summary-day-title">
            <span class="summary-day-num">Day ${day}</span>
            <span class="summary-day-name">${c.title}</span>
          </div>
          <div style="display:flex;align-items:center;gap:10px;">
            ${score !== undefined ? `<span style="font-size:11px;color:var(--green);">${score}%</span>` : ''}
            <span style="font-size:11px;color:var(--text3);">${date}</span>
            <span class="summary-chevron">▼</span>
          </div>
        </div>
        <div class="summary-day-body">
          ${c.summaryTerms.map(t => `
            <div class="summary-term">
              <div class="summary-term-name">${t.name}</div>
              <div class="summary-term-desc">${t.desc}</div>
            </div>
          `).join('')}
        </div>
      </div>
    `;
  }).join('');
}

function toggleSummary(id) {
  const card = document.getElementById(id);
  card.classList.toggle('open');
}

// ════════════════════════════════════════
// UTILS
// ════════════════════════════════════════
function shuffle(arr) {
  for (let i = arr.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]] = [arr[j],arr[i]];
  }
  return arr;
}

function showToast(msg) {
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

// ════════════════════════════════════════
// INIT
// ════════════════════════════════════════
renderHome();
</script>
</body>
</html>
